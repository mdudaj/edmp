{{- if .Values.security.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "edmp-platform.fullname" . }}-backend
  labels:
    {{- include "edmp-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: backend
      {{- include "edmp-platform.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{ .Values.security.networkPolicy.ingressNamespaceSelector.key }}: {{ .Values.security.networkPolicy.ingressNamespaceSelector.value | quote }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: postgres
              {{- include "edmp-platform.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.port }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: rabbitmq
              {{- include "edmp-platform.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.rabbitmq.port }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "edmp-platform.fullname" . }}-worker
  labels:
    {{- include "edmp-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: worker
      {{- include "edmp-platform.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: postgres
              {{- include "edmp-platform.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.postgres.port }}
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: rabbitmq
              {{- include "edmp-platform.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.rabbitmq.port }}
{{- end }}
