{{- if .Values.rabbitmq.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.rabbitmq.serviceName }}
  labels:
    {{- include "edmp-platform.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: rabbitmq
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: amqp
      port: {{ .Values.rabbitmq.port }}
      targetPort: {{ .Values.rabbitmq.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edmp-platform.fullname" . }}-rabbitmq
  labels:
    {{- include "edmp-platform.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: rabbitmq
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: rabbitmq
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: rabbitmq
          image: {{ .Values.rabbitmq.image }}
          ports:
            - containerPort: {{ .Values.rabbitmq.port }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.rabbitmq.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: {{ .Values.rabbitmq.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
{{- end }}
